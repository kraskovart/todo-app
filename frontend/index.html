<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 40px 16px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 24px;
            color: #1a1a2e;
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #4f46e5;
        }

        button.add-btn {
            padding: 10px 20px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        button.add-btn:hover { background: #4338ca; }

        .task-list { list-style: none; }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .task-item:last-child { border-bottom: none; }

        .task-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #4f46e5;
        }

        .task-title {
            flex: 1;
            font-size: 15px;
            color: #333;
        }

        .task-title.done {
            text-decoration: line-through;
            color: #aaa;
        }

        button.delete-btn {
            background: none;
            border: none;
            color: #e53e3e;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
        }

        .empty {
            text-align: center;
            color: #aaa;
            padding: 32px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Мои задачи</h1>
        <div class="input-row">
            <input type="text" id="taskInput" placeholder="Новая задача..." />
            <button class="add-btn" onclick="addTask()">Добавить</button>
        </div>
        <ul class="task-list" id="taskList"></ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
